name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: PHP ${{ matrix.php }} (${{ matrix.ts }}) — Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        ts: [nts, ts]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
        env:
          phpts: ${{ matrix.ts }}

      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Build extension
        run: |
          phpize
          ./configure --with-vulkan
          make -j$(nproc)

      - name: Verify extension loads
        run: php -d extension=modules/vulkan.so -m | grep vulkan

      - name: Run phpinfo
        run: php -d extension=modules/vulkan.so -r "phpinfo(INFO_MODULES);" | grep -A5 "vulkan"

      - name: Run examples (no GPU on CI runners)
        run: |
          php -d extension=modules/vulkan.so examples/01_enumerate_devices.php || true
          php -d extension=modules/vulkan.so examples/03_memory_info.php || true

  macos:
    name: PHP ${{ matrix.php }} (${{ matrix.ts }}) — macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        ts: [nts, ts]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
        env:
          phpts: ${{ matrix.ts }}

      - name: Install Vulkan SDK
        run: brew install vulkan-headers vulkan-loader molten-vk

      - name: Build extension
        run: |
          phpize
          ./configure --with-vulkan
          make -j$(sysctl -n hw.ncpu)

      - name: Verify extension loads
        run: php -d extension=modules/vulkan.so -m | grep vulkan

      - name: Run phpinfo
        run: php -d extension=modules/vulkan.so -r "phpinfo(INFO_MODULES);" | grep -A5 "vulkan"

      - name: Run examples
        run: |
          php -d extension=modules/vulkan.so examples/01_enumerate_devices.php || true
          php -d extension=modules/vulkan.so examples/03_memory_info.php || true
